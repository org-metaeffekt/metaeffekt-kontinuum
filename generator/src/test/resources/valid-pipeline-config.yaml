# This example shows multiple assets and how they are utilized to define what outputs to produce.
# The compiler reads this file and generates a GitLab CI child pipeline (or local execution plan).
projectProperties:
  project:
    name: "metaeffekt-gitlab-components"
    version: "1.0.0"
    tenant: "metaeffekt"
  assets:
    - id: "alacritty-0.17.0"
      name: "alacritty"
      version: "0.17.0"
      reference: "inventories/example-reference-inventory/inventory"
      assessmentId: "alacritty"
      context: "local"
      urlResolver:
        url: "https://github.com/alacritty/alacritty/archive/refs/tags/v0.17.0.zip"
    - id: "spdx"
      name: "spdx-java-library"
      version: "2.0.1"
      reference: "inventories/example-reference-inventory/inventory"
      assessmentId: "spdx-java-library"
      context: "local"
      urlResolver:
        urlPattern: "https://github.com/spdx/Spdx-Java-Library/archive/refs/tags/v${version}.zip"

# Reports define which document types are produced and which assets they consume.
# Supported types: VR, VSR, CR, SDA, LD, ILD, CA
# The compiler derives per-asset processing requirements from these types.
reports:
  - assetId: "alacritty-0.17.0"
    type: "VR"
  - assetId: "alacritty-0.17.0"
    type: "LD"
  - assetId: "spdx"
    type: "CR"

# Dashboards define which assets should have vulnerability dashboards generated.
dashboards:
  - assetId: "alacritty-0.17.0"
  - assetId: "spdx"

# Optional: global pipeline configuration
options:
  global:
    documentLanguage: "en"
  enrichment:
    securityPolicyFile: "policies/security-policy/security-policy.json"
    securityPolicyActiveIds: ["base_configuration"]
  document:
    organization: "metaeffekt"
    classificationRating: "DEFAULT"
    controlRating: "DEFAULT"
