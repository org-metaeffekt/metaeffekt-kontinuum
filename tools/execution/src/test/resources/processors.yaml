      - key: param.portfolio.manager.token
        description: Upload user token for project; always pass as credential/secret.
        required: true
      - key: param.product.name
        description: The product name.
        required: true
      - key: param.product.version
        description: The product version.
        required: true
      - key: param.product.artifact.id
        description: The product artifact id.
        required: true
      - key: param.keystore.config.file
        description: Path to the keystore.
        required: true
      - key: param.truststore.config.file
        description: Path to the truststore.
        required: true
      - key: param.keystore.password
        description: Keystore password, always pass as credential/secret.
        required: true
      - key: param.truststore.password
        description: Truststore password, always pass as credential/secret.
        required: true

  - name: Transform Inventories
    id: transform-inventories
    description: |
      This process performs a transformation on a specified inventory using a Kotlin Script. These transformations can range from inventory merging to field replacements.
    pomLocation: util/util_transform-inventories.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory containing the input inventories to perform the transformation with.
        required: true
      - key: output.inventory.dir
        description: The directory to which the output inventories will be saved after transformation.
        required: true
      - key: param.kotlin.script.file
        description: The file of the Kotlin Script to be used for transforming inventories.
        required: true
      - key: param.filter.preset
        description: A preset listed in the called kotlin script which can be used to configure how the inventory is filtered.
        required: false
      - key: param.asset.name
        description: The inventory asset name, only relevant when working with a metaeffekt-workbench or workspace.
        required: false

  - name: Validate Reference Inventory
    id: validate-reference-inventory
    description: |
      This process takes an input inventory directory and validates the contained inventories.
    pomLocation: util/util_validate-reference-inventory.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory containing the inventories to be validated.
        required: true
