processors:
  - name: Attach Metadata
    id: attach-metadata
    description: |
      This process attaches specified metadata to a given input inventory. This process can be triggered before dashboard / report creation to ensure that necessary metadata is available.
    pomLocation: advise/advise_attach-metadata.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The inventory file to which the metadata will be attached.
        required: true
      - key: output.inventory.file
        description: The inventory with the new metadata attached. Can be the same as the input inventory.
        required: true
      - key: param.metadata.asset.id
        description: The asset ID which will be attached to the inventory.
        required: true
      - key: param.metadata.asset.name
        description: The asset name which will be attached to the inventory.
        required: false
      - key: param.metadata.asset.version
        description: The asset version which will be attached to the inventory.
        required: false
      - key: param.metadata.asset.path
        description: The asset path which will be attached to the inventory.
        required: false
      - key: param.metadata.asset.type
        description: The asset type which will be attached to the inventory.
        required: false

  - name: Create Dashboard
    id: create-dashboard
    description: |
      This process takes an enriched input inventory and creates a Vulnerability Assessment Dashboard from it. Additional parameters can influence the information contained in the resulting dashboard.
    pomLocation: advise/advise_create-dashboard.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input inventory from which the dashboard will be generated.
        required: true
      - key: output.dashboard.file
        description: The file of the resulting vulnerability assessment dashboard.
        required: true
      - key: param.security.policy.file
        description: The security policy file to use.
        required: true
      - key: param.security.policy.active.ids
        description: The activeIds of the security policy configurations to use for enrichment.
        required: false
      - key: param.timeline.conf.enabled
        description: Enables the timeline configuration overall. Enabled by default.
        required: false
      - key: param.timeline.max.threads
        description: The maximum number of threads working on timelines. Defaults to 4.
        required: false
      - key: param.timeline.time.spent.max
        description: The maximum number of seconds spent per timeline. Defaults to 10000ms.
        required: false
      - key: param.timeline.vuln.providers.list
        description: A list of vulnerability providers used to generate the timelines. Empty by default.
        required: false
      - key: param.tenant.id
        description: The tenant id, necessary for the assessment server.
        required: true
      - key: param.asset.id
        description: The asset id, necessary for the assessment server.
        required: true
      - key: param.assessment.context
        description: The assessment context, necessary for the assessment server.
        required: true
      - key: env.vulnerability.mirror.dir
        description: The directory containing the vulnerability database/index.
        required: true
      - key: env.vulnerability.assessment.api
        description: Backend for dynamic vulnerability assessment. Disabled by default.
        required: false

  - name: Enrich Inventory
    id: enrich-inventory
    description: |
      This process takes an input inventory and enriches it with vulnerability information. Additional configurations can influence the information contained in the resulting inventory such as which vulnerability databases should be used, custom vulnerabilities and many more.
    pomLocation: advise/advise_enrich-inventory.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input inventory file which will be enriched.
        required: true
      - key: output.inventory.file
        description: The file of the resulting output inventory.
        required: true
      - key: output.tmp.dir
        description: The directory containing temporary files like intermediate inventories.
        required: true
      - key: param.correlation.dir
        description: The directory containing vulnerability correlation information.
        required: true
      - key: param.assessment.dirs
        description: A comma separated list of all directories or files containing assessments.
        required: true
      - key: param.context.dirs
        description: A comma separated list of all directories or files containing contexts.
        required: true
      - key: param.security.policy.file
        description: The security policy file to use.
        required: true
      - key: param.security.policy.active.ids
        description: The activeIds of the security policy configurations to use for enrichment.
        required: false
      - key: param.activate.msrc
        description: Determines if msrc is enabled.
        required: false
      - key: param.activate.nvd
        description: Determines if nvd is enabled.
        required: false
      - key: param.activate.certfr
        description: Determines if certfr is enabled.
        required: false
      - key: param.activate.certeu
        description: Determines if certeu is enabled.
        required: false
      - key: param.activate.certsei
        description: Determines if certsei is enabled.
        required: false
      - key: param.activate.kev
        description: Determines if kev is enabled.
        required: false
      - key: param.activate.epss
        description: Determines if epss is enabled.
        required: false
      - key: param.activate.eol
        description: Determines if eol is enabled.
        required: false
      - key: param.activate.osv
        description: Determines if osv is enabled.
        required: false
      - key: param.activate.csaf
        description: Determines if csaf is enabled.
        required: false
      - key: param.activate.purl.derivation
        description: Determines if purl derivation is enabled.
        required: false
      - key: param.activate.status
        description: Determines if the status is enabled.
        required: false
      - key: param.activate.keywords
        description: Determines if keywords are enabled.
        required: false
      - key: param.activate.validation
        description: Determines if inventory validation is enabled.
        required: false
      - key: param.exclude.nvd.equivalent.msrc
        description: Determines whether vulnerabilities from MSRC equivalent to those found via NVD should be excluded.
        required: false
      - key: param.exclude.nvd.equivalent.osv
        description: Determines whether vulnerabilities from OSV equivalent to those found via NVD should be excluded.
        required: false
      - key: param.vulnerabilities.custom.dir
        description: The directory for custom vulnerabilities that can be added to enrichment.
        required: false
      - key: param.dashboard.title
        description: Title for a dashboard which could be generated during this process.
        required: false
      - key: param.dashboard.subtitle
        description: Subtitle for a dashboard which could be generated during this process.
        required: false
      - key: param.dashboard.footer
        description: Footer for a dashboard which could be generated during this process.
        required: false
      - key: env.vulnerability.mirror.dir
        description: The directory of the vulnerability mirror / index.
        required: true

  - name: Enrich with Reference
    id: enrich-with-reference
    description: |
      This process enriches a specified input inventory with a reference directory to curate it with further information for later enrichment.
    pomLocation: advise/advise_enrich-with-reference.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The file path of the inventory which will be enriched with the reference inventory.
        required: true
      - key: output.inventory.dir
        description: The target directory for the enriched output inventory.
        required: true
      - key: output.inventory.path
        description: The path of the output inventory relative to 'output.inventory.dir'.
        required: true
      - key: param.reference.inventory.dir
        description: The directory of the reference inventory with which the input inventory is enriched.
        required: true

  - name: CycloneDX to Inventory
    id: cyclonedx-to-inventory
    description: |
      Used to convert a CycloneDX document into an inventory.
    pomLocation: convert/convert_cyclonedx-to-inventory.xml
    goal: process-resources
    parameters:
      - key: input.bom.file
        description: The CycloneDX bom which to convert to an inventory.
        required: true
      - key: output.inventory.file
        description: The file path of the output inventory.
        required: true
      - key: param.include.metadata.component.enabled
        description: If set to true, includes components contained in the CycloneDX metadata field.
        required: false
      - key: param.derive.attributes.from.purl.enabled
        description: If set to true, derives attributes not present as CycloneDX fields from the purl if possible.
        required: false
      - key: param.include.assets.enabled
        description: If set to true, includes CycloneDX components recognized as assets.
        required: false
      - key: param.include.licenses.enabled
        description: If set to true, licenses listed in the CycloneDX document will be included in the inventory.
        required: false

  - name: Inventory to CycloneDX
    id: inventory-to-cyclonedx
    description: |
      Used to convert an inventory into a CycloneDX BOM either xml or json format.
    pomLocation: convert/convert_inventory-to-cyclonedx.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input inventory file used to generate the CycloneDX BOM.
        required: true
      - key: output.bom.file
        description: The output file where the generated CycloneDX BOM will be written.
        required: true
      - key: param.document.name
        description: The name of the generated document (e.g., project or product name).
        required: true
      - key: param.document.organization
        description: The name of the organization responsible for the document.
        required: true
      - key: param.document.organization.url
        description: The URL of the organization responsible for the document.
        required: true
      - key: param.document.output.format
        description: The output format of the document (e.g. XML, JSON).
        required: false
      - key: param.document.version
        description: The version (iteration) of the generated document.
        required: false
      - key: param.document.description
        description: A description of the document.
        required: false
      - key: param.document.person
        description: The name of the person responsible for the document.
        required: false
      - key: param.document.comment
        description: A free-text comment to include in the document metadata.
        required: false
      - key: param.custom.license.mappings
        description: Path to custom license mappings. These map found licenses to specific or custom licenses during the conversion process.
        required: false
      - key: param.map.relationships.enabled
        description: Whether to map relationships between components in the BOM.
        required: false
      - key: param.license.expressions.enabled
        description: Whether to use SPDX license expressions instead of plain license names.
        required: false
      - key: param.include.license.texts.enabled
        description: Whether to include full license texts in the BOM.
        required: false
      - key: param.include.assets.enabled
        description: Whether to include assets in the BOM.
        required: false
      - key: param.technical.properties.enabled
        description: Whether to include technical properties in the BOM, required to enable near-lossless roundtrip conversion.
        required: false
      - key: param.derive.attributes.from.purl.enabled
        description: Whether to derive missing attributes from the purl where possible.
        required: false

  - name: Inventory to SPDX
    id: inventory-to-spdx
    description: |
      This process converts an inventory, independent of which stage it was produced in, into an SPDX document. Parameters marked as "not required" already have default values associated.
    pomLocation: convert/convert_inventory-to-spdx.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input inventory file used to generate the SPDX BOM.
        required: true
      - key: output.bom.file
        description: The output file where the generated SPDX BOM will be written.
        required: true
      - key: param.document.name
        description: The name of the generated document (e.g., project or product name).
        required: true
      - key: param.document.organization
        description: The name of the organization responsible for the document.
        required: true
      - key: param.document.organization.url
        description: The URL of the organization responsible for the document.
        required: true
      - key: param.document.output.format
        description: The output format of the document (e.g. XML, JSON).
        required: false
      - key: param.document.version
        description: The version (iteration) of the generated document.
        required: false
      - key: param.document.description
        description: A description of the document.
        required: false
      - key: param.document.person
        description: The name of the person responsible for the document.
        required: false
      - key: param.document.comment
        description: A free-text comment to include in the document metadata.
        required: false
      - key: param.document.id.prefix
        description: A prefix for every SPDX element ID.
        required: false
      - key: param.custom.license.mappings.enabled
        description: Path to custom license mappings. These map found licenses to specific or custom licenses during the conversion process.
        required: false
      - key: param.map.relationships.enabled
        description: Whether to map relationships between components in the BOM.
        required: false
      - key: param.license.expressions.enabled
        description: Whether to use SPDX license expressions instead of plain license names.
        required: false
      - key: param.include.license.texts.enabled
        description: Whether to include full license texts in the BOM.
        required: false
      - key: param.include.assets.enabled
        description: Whether to include assets in the BOM.
        required: false
      - key: param.technical.properties.enabled
        description: Whether to include technical properties in the BOM, required to enable near-lossless roundtrip conversion.
        required: false
      - key: param.derive.attributes.from.purl.enabled
        description: Whether to derive missing attributes from the purl where possible.
        required: false

  - name: Copy POM Dependencies
    id: copy-pom-dependencies
    description: |
      This process copies dependencies found in a pom.xml file into a directory for further processing.
    pomLocation: extract/extract_copy-pom-dependencies.xml
    goal: process-resources
    parameters:
      - key: output.dependencies.dir
        description: The output directory in which to copy the extracted dependencies.
        required: true
      - key: param.group.id
        description: The group ID of the pom containing the relevant dependencies.
        required: true
      - key: param.artifact.id
        description: The artifact ID of the pom containing the relevant dependencies.
        required: true
      - key: param.version
        description: The version of the pom containing the relevant dependencies.
        required: true
      - key: param.exclude.transitive.enabled
        description: Set to false if transitive dependencies should be included in the extract.
        required: true

  - name: Save Inspect Image
    id: save-inspect-image
    description: |
      This process saves and inspects a docker container image via its id and version. The extracted container information is then saved into a specified directory for further processing.
    pomLocation: extract/extract_save-inspect-image.xml
    goal: process-resources
    parameters:
      - key: output.dir
        description: The output directory for the extracted container image information.
        required: true
      - key: param.image.id
        description: The ID of the container image. Either in Format [id] or [repository/id] depending on whether the image is in the official docker repo or not.
        required: true
      - key: param.image.version
        description: The image version tag.
        required: true

  - name: Download Data Sources
    id: download-data-sources
    description: |
      This process downloads the vulnerability mirror from different data sources.
    pomLocation: mirror/mirror_download-data-sources.xml
    goal: process-resources
    parameters:
      - key: param.proxy.scheme
        description: The proxy scheme.
        required: false
      - key: param.proxy.host
        description: The proxy host.
        required: false
      - key: param.proxy.port
        description: The proxy port.
        required: false
      - key: param.proxy.user
        description: The proxy user.
        required: false
      - key: param.proxy.pass
        description: The proxy pass.
        required: false
      - key: param.fail.on.error
        description: Fails the process in case an error is detected during download. Defaults to true.
        required: false
      - key: param.fail.on.issue
        description: Fails the process in case of an integrity issue or incomplete state with the download. Defaults to true.
        required: false
      - key: env.mirror.dir
        description: The directory to which the mirror data is downloaded.
        required: true
      - key: env.nvd.apikey
        description: An API key to access the NVD database.
        required: true

  - name: Download Index
    id: download-index
    description: |
      This process downloads the vulnerability mirror index from an archive URL.
    pomLocation: mirror/mirror_download-index.xml
    goal: process-resources
    parameters:
      - key: param.mirror.archive.url
        description: The source url of the vulnerability mirror archive.
        required: true
      - key: env.vulnerability.mirror.dir
        description: The target directory of the vulnerability mirror archive.
        required: true

  - name: Update Index
    id: update-index
    description: |
      This processor creates or updates the indices of the mirror. It uses the previously downloaded data files of the external data sources. As a result the specified mirror directory is extended with the index files.
    pomLocation: mirror/mirror_update-index.xml
    goal: process-resources
    parameters:
      - key: param.proxy.scheme
        description: The proxy scheme.
        required: false
      - key: param.proxy.host
        description: The proxy host.
        required: false
      - key: param.proxy.port
        description: The proxy port.
        required: false
      - key: param.proxy.user
        description: The proxy user.
        required: false
      - key: param.proxy.pass
        description: The proxy pass.
        required: false
      - key: param.fail.on.error
        description: Fails the process in case an error is detected during indexing. Defaults to true.
        required: false
      - key: param.fail.on.issue
        description: Fails the process in case of an integrity issue or incomplete state with the index. Defaults to true.
        required: false
      - key: env.mirror.dir
        description: The directory in which index will be created or updated.
        required: true

  - name: Update Index External
    id: update-index_external
    description: |
      This processor creates or updates the indices of the mirror. It uses the previously downloaded data files of the external data sources. As a result the specified mirror directory is extended with the index files.
    pomLocation: mirror/mirror_update-index_external.xml
    goal: process-resources
    parameters:
      - key: param.proxy.scheme
        description: The proxy scheme.
        required: false
      - key: param.proxy.host
        description: The proxy host.
        required: false
      - key: param.proxy.port
        description: The proxy port.
        required: false
      - key: param.proxy.user
        description: The proxy user.
        required: false
      - key: param.proxy.pass
        description: The proxy pass.
        required: false
      - key: env.mirror.dir
        description: The directory in which index will be created or updated.
        required: true

  - name: Copy Resources
    id: copy-resources
    description: |
      This process copies files needed for creating the overview report. The different sources need to be specified and are copied into the intended directory structure for the overview creation.
    pomLocation: portfolio/portfolio_copy-resources.xml
    goal: process-resources
    parameters:
      - key: input.inventories.dir
        description: The source directory containing inventory files (.xlsx) to be copied.
        required: true
      - key: input.dashboards.dir
        description: The source directory containing dashboard files (.html) to be copied.
        required: true
      - key: input.reports.dir
        description: The source directory containing report files (.pdf) to be copied.
        required: true
      - key: input.advisor.inventories.dir
        description: The source directory containing advisor inventory files (.xlsx) to be copied.
        required: true
      - key: output.resources.dir
        description: The base target directory where the resources will be copied to.
        required: true

  - name: Create Overview
    id: create-overview
    description: |
      This process creates an overview with the resources copied with the portfolio_copy-resources.xml processor.
    pomLocation: portfolio/portfolio_create-overview.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory of the input inventory.
        required: true
      - key: input.inventory.path
        description: The input inventory's path relative to input.inventory.dir.
        required: true
      - key: input.advisor.inventories.dir
        description: The source directory containing advisor inventory files (.xlsx).
        required: true
      - key: input.dashboards.dir
        description: The source directory containing dashboard files (.html).
        required: true
      - key: input.reports.dir
        description: The source directory containing report files (.pdf).
        required: true
      - key: output.overview.file
        description: The name of the output overview file.
        required: true
      - key: output.notification.file
        description: The name of the output notification file.
        required: false
      - key: param.security.policy.file
        description: The security policy file used for the overview.
        required: true
      - key: param.security.policy.active.ids
        description: The activeIds of the security policy configurations to use for overview creation.
        required: false
      - key: param.notification.config.file
        description: The configuration file for notification.
        required: false
      - key: param.notification.rule.file
        description: The rule file for notification.
        required: false

  - name: Scan Directory
    id: scan-directory
    description: |
      This process scans a directory containing extracted / prepared artifacts into an inventory. The artifacts contained in the input directory are usually a result of the prepare process which extracts information from container images, dependencies listed in poms and so on.
    pomLocation: prepare/prepare_scan-directory.xml
    goal: process-resources
    parameters:
      - key: input.extract.dir
        description: The directory containing extracted information to scan. This can be container extracts, pom dependencies etc.
        required: true
      - key: output.scan.dir
        description: The output directory for the scanned files.
        required: true
      - key: output.inventory.file
        description: The output inventory containing the scanned information.
        required: true
      - key: param.reference.inventory.dir
        description: The directory of the reference inventory with which the input inventory is enriched.
        required: true

  - name: Aggregate Annex Folders
    id: aggregate-annex-folders
    description: |
      This process enables the aggregation of license and component information for a specified inventory. The content will be generated to the specified target directories. This process is a part of the creation of a Software Distribution Annex.
    pomLocation: report/report_aggregate-annex-folders.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input inventory for which the contents are to be aggregated.
        required: true
      - key: param.reference.inventory.dir
        description: The input reference inventory with which the input inventory will be enriched. This is the parent directory of the license and components directories.
        required: true
      - key: param.reference.inventory.includes
        description: A comma separated list of included file types for the reference inventory, default is "**/*.ser,**/*.xls,**/*.xlsx".
        required: false
      - key: param.reference.component.path
        description: The component path of the reference inventory, default is "components".
        required: false
      - key: param.reference.license.path
        description: The license path of the reference inventory, default is "licenses".
        required: false
      - key: param.target.component.dir
        description: The target directory for the components, default is "${project.build.dir}/annex/components".
        required: false
      - key: param.target.license.dir
        description: The target directory for the licenses, default is "${project.build.dir}/annex/licenses".
        required: false
      - key: param.fail.on.missing.license.file
        description: A boolean for controlling whether the process fails if a license file is missing, default is "true".
        required: false

  - name: Create Annex Archive
    id: create-annex-archive
    description: |
      This process is for generating the archive .zip containing all Annex relevant content. The .zip contains the PDF document as well as the aggregated license and component directories of the inventory.
    pomLocation: report/report_create-annex-archive.xml
    goal: process-resources
    parameters:
      - key: input.document.pdf.file
        description: The input PDF document for the Annex archive.
        required: true
      - key: output.annex.archive.file
        description: The output Annex archive file.
        required: true
      - key: input.inventory.components.dir
        description: The directory containing the components of the inventory for which the Annex is created.
        required: false
      - key: input.inventory.licenses.dir
        description: The directory containing the licenses of the inventory for which the Annex is created.
        required: false

  - name: Create Document
    id: create-document
    description: |
      This process creates a document for a selected document type. Types to choose from are vulnerability report (VR), cert report (CR), software distribution annex (SDA), license documentation (LD) and initial license documentation (ILD). The document is generated for a specified set of inventories using an asset descriptor.
    pomLocation: report/report_create-document.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory of the input inventories for the document.
        required: true
      - key: output.document.file
        description: The file where to store the resulting output document.
        required: true
      - key: param.computed.inventory.dir
        description: The directory where to store the computed (filtered) inventory.
        required: false
      - key: param.template.dir
        description: The directory containing the document template.
        required: false
      - key: param.document.type
        description: The type of the document, choose from VR (vulnerability-report), CR (cert-report), SDA (software distribution annex), CAD (custom annex document), LD (license distribution) or ILD (initial license distribution).
        required: true
      - key: param.document.language
        description: The language of the document, currently de (German) and en (English) are supported.
        required: false
      - key: param.asset.id
        description: The Id of the asset.
        required: true
      - key: param.asset.name
        description: The name of the asset.
        required: true
      - key: param.asset.version
        description: The version of the asset.
        required: true
      - key: param.product.name
        description: The name of the product.
        required: true
      - key: param.product.version
        description: The version of the product.
        required: true
      - key: param.product.watermark
        description: The watermark of the product.
        required: true
      - key: param.overview.advisors
        description: The selection of advisors for which the overview is created, provide as a comma-separated list (e.g. "CERT-FR, ..."). Required for VR/CR only.
        required: false
      - key: param.property.selector.organization
        description: Templates may introduce a set of custom properties. These properties are loaded via a dedicated set of property files qualified by this selector.
        required: true
      - key: param.property.selector.classification
        description: Templates may introduce a set of custom properties. These properties are loaded via a dedicated set of property files qualified by this selector.
        required: false
      - key: param.property.selector.control
        description: Templates may introduce a set of custom properties. These properties are loaded via a dedicated set of property files qualified by this selector.
        required: false
      - key: param.security.policy.file
        description: The file containing the security policy configurations for the workbench. Required for VR/VSR/CR only.
        required: false
      - key: param.asset.descriptor.file
        description: The file of the asset descriptor used for the document.
        required: true
      - key: param.reference.inventory.dir
        description: The directory of the reference inventory for the document. Required for VR only.
        required: false
      - key: param.reference.license.dir
        description: The path to the reference license directory.
        required: false
      - key: param.reference.component.dir
        description: The path to the reference component directory.
        required: false
      - key: env.kontinuum.dir
        description: The directory of the kontinuum.
        required: true
      - key: env.kontinuum.processors.dir
        description: The directory of the kontinuum processors.
        required: false
      - key: env.workbench.dir
        description: The directory of the workbench.
        required: false
      - key: env.vulnerability.mirror.dir
        description: The input database containing the vulnerability data. Required for VR/VSR/CR only.
        required: false

  - name: Resolve Inventory
    id: resolve-inventory
    description: |
      Used to resolve all artifacts contained in an inventory and gather additional information on those artifacts.
    pomLocation: resolve/resolve_resolve-inventory.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input file path of the inventory which is to be resolved.
        required: true
      - key: output.inventory.file
        description: The output file path of the resolved inventory.
        required: true
      - key: param.artifact.resolver.config.file
        description: Yaml file containing config options for the resolver.
        required: true
      - key: param.artifact.resolver.proxy.file
        description: Yaml file containing proxy information for the resolver.
        required: true
      - key: env.maven.index.dir
        description: Download directory of the Maven repo index.
        required: true

  - name: Scan Inventory
    id: scan-inventory
    description: |
      Scans a resolved inventory for licenses and copyrights and writes the resulting information to an inventory.
    pomLocation: scan/scan_scan-inventory.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The resolved input inventory file path.
        required: true
      - key: output.inventory.file
        description: The scanned output inventory file path.
        required: true
      - key: input.output.analysis.base.dir
        description: The directory in which the scanner caches information on artifacts. Increases speed drastically between multiple scanner runs.
        required: true
      - key: param.properties.file
        description: Yaml file containing properties to configure the scanner's behaviour.
        required: true

  - name: Aggregate Sources
    id: aggregate-sources
    description: |
      Currently under review.
    pomLocation: util/util_aggregate-sources.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The input inventory file.
        required: false
      - key: target.dir
        description: The target directory.
        required: false
      - key: annex.source.dir
        description: The annex source directory.
        required: false
      - key: retained.sources.dir
        description: The retained sources directory.
        required: false
      - key: alternative.artifact.source.mapping
        description: Alternative artifact source mapping.
        required: false
      - key: include.all.sources
        description: Whether to include all sources.
        required: false
      - key: fail.on.missing.sources
        description: Whether to fail on missing sources.
        required: false

  - name: Convert Assessments
    id: convert-assessments
    description: |
      This process creates two output files containing the differences between two provided inventory versions. Which inventory version is declared as "base" and which as "compare" is negligible since the comparison is done in both ways and saved separately.
    pomLocation: util/util_convert-assessments.xml
    goal: process-resources
    parameters:
      - key: input.assessment.dir
        description: The directory containing assessment files which will be converted.
        required: true
      - key: output.assessment.dir
        description: The directory containing the converted assessment files.
        required: true
      - key: param.output.mode
        description: The output mode controlling converter behaviour. Can be MERGE, DIRECTORY or IN_PLACE.
        required: true
      - key: param.output.format
        description: The format in which the assessments will be saved. Can be JSON, YAML or PRESERVE.
        required: true

  - name: Copy Inventories
    id: copy-inventories
    description: |
      Copies a list of inventories to a directory. This is a utility processor used to copy different inventories from individual locations to a common directory.
    pomLocation: util/util_copy-inventories.xml
    goal: process-resources
    parameters:
      - key: input.base.dir
        description: The directory in which the inventories are located.
        required: false
      - key: output.inventories.dir
        description: The output directory to which the files are copied.
        required: true
      - key: param.inventories.list
        description: The list containing the inventories to copy to the output directory.
        required: true

  - name: Create Diff
    id: create-diff
    description: |
      This process creates two output files containing the differences between two provided inventory versions. Which inventory version is declared as "base" and which as "compare" is negligible since the comparison is done in both ways and saved separately.
    pomLocation: util/util_create-diff.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The file of the base inventory for comparison.
        required: true
      - key: input.inventory.compare.file
        description: The file of the inventory to be compared with the base inventory.
        required: true
      - key: output.inventory.dir
        description: The output directory for saving the results of the diff.
        required: true
      - key: param.inventory.version
        description: The version of the base inventory.
        required: true
      - key: param.inventory.compare.version
        description: The version of the compare inventory.
        required: true
      - key: param.security.policy.file
        description: The security policy file to use for the diff.
        required: true
      - key: param.security.policy.active.ids
        description: The active ids of the security policy configuration.
        required: false

  - name: Enrich Advisors
    id: enrich-advisors
    description: |
      This process enriches an inventory based on the specified advisors. It is only used for cert-report document generation.
    pomLocation: util/util_enrich-advisors.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The file of the input inventory for enrichment.
        required: true
      - key: output.inventory.file
        description: The output inventory of the enrichment process.
        required: true
      - key: param.security.policy.file
        description: The security policy file needed to filter the inventory.
        required: true
      - key: param.security.policy.active.ids
        description: The activeIds of the security policy configuration.
        required: false
      - key: param.report.period.since
        description: The lower bound of the report query period.
        required: false
      - key: param.report.period.until
        description: The upper bound of the report query period.
        required: false
      - key: env.vulnerability.mirror.dir
        description: The location of the vulnerability database used for inventory enrichment.
        required: true

  - name: Generate Report SVG
    id: generate-report-svg
    description: |
      This process generates the SVG resources for different types of vulnerability reports for a specified inventory.
    pomLocation: util/util_generate-report-svg.xml
    goal: process-resources
    parameters:
      - key: input.inventory.file
        description: The file of the input inventory for SVG generation.
        required: true
      - key: output.svg.dir
        description: The output directory for the svg resources.
        required: true
      - key: param.overview.active
        description: Boolean for enabling overview charts to be generated, default is "true".
        required: false
      - key: param.cvss.active
        description: Boolean for enabling cvss charts to be generated, default is "true".
        required: false
      - key: param.cvss.vulnerability.count.limit
        description: The limit of the cvss vulnerability count.
        required: false
      - key: param.security.policy.file
        description: The security policy file used for SVG generation.
        required: false
      - key: param.security.policy.active.ids
        description: The Ids of the security policy configurations to activate.
        required: false

  - name: Merge Advisors
    id: merge-advisors
    description: |
      This process merges inventories based on an individual security advisor and filters them using the security policy.
    pomLocation: util/util_merge-advisors.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory containing the inventories to be merged.
        required: true
      - key: output.inventory.file
        description: The file path of the output inventory containing the merged data.
        required: true
      - key: param.security.policy.file
        description: The security policy file needed to filter the inventory.
        required: true
      - key: param.security.policy.active.ids
        description: The activeIds of the security policy configuration.
        required: false

  - name: Merge Assessments
    id: merge-assessments
    description: |
      This process merges inventories and their assessments.
    pomLocation: util/util_merge-assessments.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory containing the inventories to be merged.
        required: true
      - key: output.inventory.file
        description: The file path of the output inventory containing the merged data.
        required: true

  - name: Merge Inventories
    id: merge-inventories
    description: |
      This process merges multiple input inventories into one output inventory. The input inventories are specified using a directory. Additionally, a regex can be provided to further specify the inventories used for merging within the given directory. This process can be triggered at any point in the pipeline and is not bound to a phase.
    pomLocation: util/util_merge-inventories.xml
    goal: process-resources
    parameters:
      - key: input.inventory.dir
        description: The directory containing the inventories to be merged.
        required: true
      - key: output.inventory.file
        description: The file path of the output inventory containing the merged data.
        required: true
      - key: param.inventory.includes
        description: Regex used to specify which file names are considered for merging, default is "**/*.xls,**/*.xlsx".
        required: false

  - name: Portfolio Download
    id: portfolio-download
    description: |
      This process enables the download of specific assets from a running portfolio manager service.
    pomLocation: util/util_portfolio-download.xml
    goal: process-resources
    parameters:
      - key: output.inventory.dir
        description: The directory in which to download all fitting inventories.
